name: Build Android APK

on:
  workflow_dispatch: # manual trigger from GitHub Actions UI
    inputs:
      phase2:
        description: 'Enable Phase 2 features (vehicles, fill-up logging, savings). Default OFF — flip ON for internal acceptance testing.'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'

# Phase 2 build-time gate: read from workflow_dispatch input when manually
# triggered, otherwise default to "false" so auto-builds on push produce
# stable artefacts that match prod intent. Code defaults to ON when this var
# is unset (see apps/mobile/src/config/flags.ts), so we set it explicitly
# here for both branches to avoid accidental Phase 2 leakage in CI APKs.
env:
  EXPO_PUBLIC_PHASE_2: ${{ github.event.inputs.phase2 == 'true' && 'true' || 'false' }}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
          EXPO_PUBLIC_MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}

      - name: Inject Mapbox access token into Android resources
        run: |
          mkdir -p android/app/src/main/res/values
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="mapbox_access_token" translatable="false">${{ secrets.MAPBOX_TOKEN }}</string></resources>' > android/app/src/main/res/values/mapbox_token.xml
        working-directory: apps/mobile

      - name: Increase Gradle heap
        run: echo "org.gradle.jvmargs=-Xmx4g" >> android/gradle.properties
        working-directory: apps/mobile

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease -x lint -x test --no-daemon --configure-on-demand --build-cache
        working-directory: apps/mobile
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
          EXPO_PUBLIC_MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          # Suffix the artifact name with the Phase 2 state so artifacts from
          # different runs don't get confused. github.sha + flag state =
          # uniquely identifies the build.
          name: litro-android-${{ github.sha }}-phase2-${{ env.EXPO_PUBLIC_PHASE_2 }}
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

            title: requestPermission in useCameraPermission not memoized
            detail: >
              New function reference each render causes handleAddPrice to recreate.
              Minor perf issue, acceptable for PoC.
          - id: D4
            title: No abort/cleanup for in-flight takePictureAsync on screen unmount
            detail: >
              State updates may fire on unmounted component. Acceptable for PoC.
              Story 3.2 scope.
          - id: D5
            title: Darkness check (AC7) not implemented — deferred
            detail: >
              JPEG-encoded bytes are Huffman-coded entropy data, not pixel values.
              Iterating over them yields meaningless luminance. Proper darkness detection
              requires pixel-level access not available via expo-image-manipulator alone.
              dark flag hardcoded to false. Resolve in Story 3.5 when OCR image pipeline
              adds proper image analysis, or via a native module.


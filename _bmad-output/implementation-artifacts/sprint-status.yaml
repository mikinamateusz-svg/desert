      - id: 6.0
        title: "Fuel Price Feed Ingestion"
        file: 6-0-fuel-price-feed-ingestion.md
        status: review
        ready_date: 2026-04-07
        dev_started: 2026-05-09
        dev_completed: 2026-05-09
        review_date: 2026-05-09
        review_findings: "Pure backend: extends OrlenIngestionWorker with Brent crude (Alpha Vantage USD/bbl) + NBP USD/PLN ingestion every cron run, computes brent_crude_pln in PLN/litre via (USD × rate ÷ 158.987), persists with rate_source 'live'/'cached'. New PriceRiseSignalPublisher fans ≥3% upward movements out to a price-rise-signals BullMQ queue (Story 6.3 will consume). Schema: brent_crude_pln SignalType enum value + nullable rate_source column, additive migration. Spec divergences vs codebase: NestJS Bull pseudocode replaced with raw BullMQ pattern (matches all 6 existing cron workers); env validation T7a deferred — service no-ops gracefully when ALPHA_VANTAGE_API_KEY missing, with [OPS-ALERT] tag in production. Three parallel reviewers (blind/edge/auditor) flagged 30+ items; high-impact fixes applied: (1) BRENT BAR DEDUP — Alpha Vantage's BRENT endpoint publishes one bar per day; cron fires twice/day. Without dedup, the second run would persist the same bar with pct_change = 0, masking a genuine next-day move because the baseline got overwritten. Fixed by storing bar date in fetchBrentUsd return + isSameBrentBar(previous.recorded_at, latestBarDate) check before write. (2) ALPHA VANTAGE RATE-LIMIT DETECTION — free tier returns HTTP 200 with `Note`/`Information` field instead of `data` on quota exhaustion. Original code treated this identically to a transient outage (silent skip with generic 'missing data point' warn). Fixed by detecting both fields explicitly and tagging [OPS-ALERT] so quota exhaustion is filterable in logs. (3) DATA ARRAY SORT — fetchBrentUsd now sorts by date desc before picking [0], defending against ascending-order responses that would silently feed a stale bar. (4) SIGNAL SOURCE MAP — replaced fragile startsWith('orlen_rack') with explicit SIGNAL_SOURCE lookup; new signal-types must be added to the map or publish skips them with a warn (vs silently mis-tagging as brent_crude_pln). (5) ORLEN recordedAt CONSISTENCY — passed writeStartedAt explicitly into each marketSignal.create({data: {... recorded_at: writeStartedAt}}) so the persisted DB column matches the in-memory MovementRecord.recordedAt the publisher carries. Without this, dashboards/tests joining published rise-signal jobs against MarketSignal.recorded_at would see drift. (6) [OPS-ALERT] CONSISTENCY — missing API key warn now tagged when NODE_ENV=production, NBP-no-cache skip now tagged consistently. (7) Worker test coverage for AC3: Brent rejected → ORLEN still publishes, Brent succeeded → both appended to publisher batch, ORLEN-only happy path. Defers (with reasoning): (a) TOCTOU on Brent findFirst→create across multi-pod deploys — systemic per project_cron_worker_multipod memory; MVP single-replica is safe. (b) 6.0 + 6.3 deploying separately could produce duplicate alerts (orlen + brent both >3% same run, no Brent delay until 6.3) — accepted because 6.3 ships in the same session. (c) BULL_REDIS_URL hard-fail in publisher onModuleInit — matches existing publisher patterns; module-level dependency. (d) Job retry config on the rise-signal queue — 6.3's worker owns retry semantics, not the publisher. (e) NBP weekend/holiday rate staleness flagging — flagged but not load-bearing for 3% threshold logic. (f) Cached NBP rate age tracking — defer; accept Redis TTL as authority. (g) PG version assumption (ALTER TYPE in transaction needs PG 12+) — Neon is PG 15. (h) ON_PREMIUM/PB_98 mapping documentation — defer. 1347/1347 api tests pass; tsc + lint clean."
        patches_applied: "2026-05-09 — Brent bar-date dedup + Alpha Vantage rate-limit detection + data array sort + explicit SIGNAL_SOURCE map + ORLEN recorded_at consistency + [OPS-ALERT] tag normalization + AC3 worker test coverage all applied. fetchBrentUsd return type widened from `number | null` to `{ value, date } | null` for the dedup. +5 new tests."
      - id: 6.1
        title: "Price Drop Alerts"
        file: 6-1-price-drop-alerts.md
        status: review
        dev_started: 2026-05-09
        dev_completed: 2026-05-09
        review_date: 2026-05-09
        review_findings: "Spec divergences vs codebase / fixes: (1) NestJS Bull pseudocode replaced with raw BullMQ pattern matching alert.worker.ts and premium-expiry-warning.worker.ts — no @InjectQueue, worker class owns queue and exposes enqueueCheck() for cross-module use. (2) PriceHistory.price_pln in spec sample is actually price (Float) — translated, with 2dp integer-cents compare in isCheaperThan() to avoid IEEE-754 boundary flips. (3) Empty price_drop_fuel_types treated as opt-out (matches Story 6.4 UI hint), not opt-in-to-all (spec literal). (4) getUserLocationProxy spec pseudocode had a logic bug (userLocation?.voivodeship after null-check) — restructured with NaN-sentinel + voivodeship-only fallback for AC5 coarse match. Three parallel reviewers (blind/edge/auditor) flagged 30+ items; high-impact fixes applied: atomic SET-NX dedup claim before send (closes TOCTOU race where two concurrent jobs for same user/fuel both pass GET-then-SET); release dedup on delivery failure so transient errors don't suppress for 4h; user-scoped stale-token cleanup (was global, would null tokens for other users sharing via device handoff/restore); lazy areaMin (skip 7-day MIN aggregation when no cheaper_than_now candidates exist); recent-drops query scoped by voivodeship + ordered by recorded_at DESC + threshold-filtered (was global price-ASC scan with no threshold gate, would have served 6.50 stations to a target=5.50 user); verifiedAt-anchored batch window so backlog jobs don't fold in newer drops; idempotent BullMQ jobId via stationId:fuel:verifiedAt tuple (BullMQ auto-dedups photo-pipeline retries); boot-race guard on enqueueCheck for cold-start; OPS-ALERT only on terminal worker failure (not per-attempt retry); parallel enqueue from photo pipeline (was serial awaits adding 30-100ms to verify hot path); freshly-fetched DB voivodeship preferred over job snapshot (admin correction wins over stale job). Defers: ST_DWithin batching with ANY($stationIds) — N+1 acceptable at MVP scale, refactor when user count grows; minimum-drop-magnitude threshold — spec doesn't require; PostGIS double-compute (ST_Distance + ST_DWithin) — minor; target_price uses <= vs spec AC3 literal < — defensible (matches 'hit your target' copy); push-notification i18n — server has no locale field on NotificationPreference; metrics counters — separate task. 1255/1255 api tests pass; tsc + lint clean."

        dev_completed: 2026-05-10
        review_date: 2026-05-10
        review_findings: "Depends on 5.8. Adds `bestSaverSavingsPln` (cohort max, integer PLN) to MonthlySummaryDto via SavingsRankingService extension; ShareableCard + savings-summary screen render 'Best in your area: X PLN'. Per spec AC5, monthly notification body NOT enriched (the bulk percentile map carries best-saver per row but the notification builder ignores it). Three parallel reviewers (blind/edge/auditor) flagged 0 BLOCKER + 3 HIGH + 4 MEDIUM + 5 LOW; 6 patches applied. (1) HIGH (F1) — leak guard's bit-exact `>=` comparison missed a near-max inference: viewer's grosz-precision savings (e.g. 247.49 PLN) + integer-rounded cohort max (248 PLN) on the same shareable card lets recipient infer viewer is rank-1-or-near. Widened guard to suppress within ±0.5 PLN of max via grosz-integer comparison (`viewerGrosz >= maxGrosz - 50`); avoids float drift, bit-exact at the rounding boundary. (2) HIGH (F5) — `Number(undefined) → NaN` if a future SQL refactor drops a column would fail-OPEN through `NaN >= NaN` (false) and ship the cohort max anyway. Added `Number.isFinite` fail-CLOSED guard at top of bestSaverWithLeakGuard — privacy guard MUST default to suppression. (3) MEDIUM (F6) — new card best-saver line risks vertical clipping on the 320×320 layout when both percentile pill + best-saver line render together (especially on Hermes Android with Cyrillic). Tightened `divider.marginVertical` from 14→10 to absorb the added line height. (4) MEDIUM (F9) — `bestSaverLine` rendered independently of `rankingPercentile` in both ShareableCard + savings-summary screen — orphaned line possible if server returns inconsistent shape. Gated on both non-null in both surfaces. (5) LOW (F11) — duplicate `formatInteger`/`formatIntegerForLocale` helpers in ShareableCard + savings-summary screen extracted to shared `apps/mobile/src/utils/formatNumber.ts`. (6) LOW (F14) — added `all-tied-at-max` test that pins the locked-in design choice (everyone in tied cohort sees suppression). Notable defers (with reasoning): (a) Math.round(N.5) semantics not pinned — server (V8) and mobile (Hermes) currently agree but coincidental; documented in code, low practical risk. (b) Race window between viewer-savings query and cohort-MAX query — pre-existing two-roundtrip semantics in getMonthlySummary; not 5.9-specific. (c) T6c mobile structural test for ShareableCard — no React Native component test harness in repo (same convention as 5.8 deferral). (d) Card copy 'Best in your area' / 'Najlepszy w okolicy' / 'Найкращий у регіоні' implies regional scoping but doesn't name the voivodeship — acceptable per AC4 letter (no region NAME), regional hint is intentional context for the recipient. (e) `adjustsFontSizeToFit` is iOS-only — matches existing pattern on monthLabel from 5.7. Rejects: (a) Float drift between viewer total and cohort MAX — both queries use identical grosz-integer math, bit-exact verified. (b) fillup.service leak-guard test only verifies pass-through — guard IS exercised in savings-ranking.service.spec.ts (4 tests). (c) Service-side rounding at api boundary — already happens inside bestSaverWithLeakGuard. (d) Argument-pinning in only 1 of 3 populated-path tests — single pin is sufficient. 1419/1419 api tests pass (was 1415, +4 new); 50/50 mobile pass; tsc + lint clean across all 8 workspaces."

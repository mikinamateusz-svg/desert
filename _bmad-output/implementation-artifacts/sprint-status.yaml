        review_date: 2026-05-10
        review_findings: "Pure additive admin readout over the existing MarketSignal table — no schema changes. Backend: AdminMarketSignalsService with getSummary (DISTINCT ON via $queryRaw, returns all 4 signal types in canonical order even when DB is empty so the AC5 'Not configured' Brent path stays driven by null fields) + getHistory (limit clamped [1, 200], unknown signal type → 400). Controller at /v1/admin/market-signals with class-level @Roles(UserRole.ADMIN). Admin app: 4 status cards in a 2x2 grid, freshness pills (fresh/watch/stale/none) with thresholds (1.5x, 3x of expected interval — 12h ORLEN, 24h Brent), expandable history tables, Brent-only cached badge + notConfigured hint. Three parallel reviewers (blind/edge/auditor) flagged 30+ items; high-impact fixes applied: (1) i18n RELATIVE TIME — original code emitted hardcoded English 'just now' / 'Xm ago' / 'Xh ago' regardless of locale; pl/uk admins would see English fragments. Added justNow/minutesAgo/hoursAgo i18n keys in all 3 locales + interface + replaced hardcoded strings with t.* lookups. (2) POLLING VISIBILITY PAUSE — original 60s setInterval ran in background tabs; multiple admin tabs would each issue 1 DB query/min indefinitely. Added document.visibilityState check before fetch. (3) ERROR BANNER NEVER CLEARED — once a poll failed, banner stayed forever even on next success. Added explicit setErrorBanner(null) on success. (4) HISTORY FETCH RACE — rapid card clicks could let an earlier signal's response overwrite a later signal's loading state. Added useRef request counter; stale responses discarded. (5) LOADING FLICKER — original code cleared historyLoading before setting historyData, producing a momentary 'No data' flash between the two state batches. Reordered: set data BEFORE clearing loading. (6) NOT-CONFIGURED HINT — original crammed the long 'Not configured — set ALPHA_VANTAGE_API_KEY' string into a small status pill where it would wrap awkwardly. Split into short pill ('Not configured') + body hint surfacing the full env-var instruction. (7) Locale-tag map — replaced nested ternary with typed Record<Locale, string> so a future Locale union widening fails at the call site rather than silently falling through to en-GB. (8) HISTORY_LIMIT extracted as constant — single source of truth used by both fetchHistory call and i18n title interpolation. (9) Cached badge gated on freshness !== 'none' (defence-in-depth). (10) Right-aligned numeric columns in history table (proper tabular alignment despite tabular-nums). (11) now snapshot via state ticked every 60s; passed to formatRelative for card-internal timestamp consistency. Defers (with reasoning): Auth integration test for 401/403 — same @Roles pattern as 7+ existing admin controllers, all rely on global RolesGuard; a regression would break ALL admin endpoints, not 4.12-specific. DST cron-aware freshness thresholds — over-engineering for MVP (constants assume zero missed runs). Discriminated union for action returns — refactor task across all admin actions. Per-signal history caching — over-engineering. ?limit=0 falls back to default 30 — documented in test ('I forgot to pass one' is more likely than 'give me zero rows'). 1376/1376 api + 41/41 admin + 50/50 mobile tests pass; tsc + lint clean."
        patches_applied: "2026-05-10 — i18n relative-time keys (justNow/minutesAgo/hoursAgo in pl/en/uk + interface) + polling visibility pause + error banner clears on success + history fetch race guard via useRef + loading flicker fix + notConfigured hint surfaced as body copy + locale-tag Record map + HISTORY_LIMIT constant + cached badge gated on freshness + right-aligned numeric columns + now snapshot in state. 4 backend tests + 4 admin server-action tests new."


      - id: 6.2
        title: "Community-Confirmed Price Rise Alerts"
        file: 6-2-community-confirmed-rise-alerts.md
        status: review
        ready_date: 2026-04-07
        dev_started: 2026-05-09
        dev_completed: 2026-05-09
        review_date: 2026-05-09
        review_findings: "Pattern: extends 6.1's BullMQ-from-photo-pipeline architecture with regional threshold evaluation (two-step CTE counting stations with ≥2% rise in last 24h vs prior 24h, 30%/min-3-stations threshold), per-voivodeship+fuel 48h dedup, predictive-alert grace window from 6.3's Redis contract (alert:rise:predictive:{voivodeship}:{fuelType}), and DistinctOn-most-recent-fillup voivodeship matching for opted-in users. Spec divergences vs codebase / fixes: NestJS Bull pseudocode replaced with raw BullMQ pattern matching alert.worker.ts and 6.1's PriceDropAlertWorker. Three parallel reviewers (blind/edge/auditor) flagged a near-BLOCKER + ~30 other items; high-impact fixes applied: (1) JOBID-PERMANENCE BUG — bare `community-rise:${voivodeship}:${fuelType}` jobId would have been permanently dedup'd while the completed job sat in `removeOnComplete: {count: 200}` retention, locking out re-evaluation forever after the first completion. Fixed by adding 30-min time bucket to jobId so bursts collapse but the next bucket re-runs. (2) EMPTY-USER DEDUP — was recording full 48h dedup when threshold met but no eligible users, silently shutting out users who opt in or have a fresh fillup in the voivodeship within the cycle. Fixed by recording 1h dedup instead in that branch. (3) Misleading inline comment in getEligibleUsers contradicted what the SQL actually does — fixed. (4) SQL division-by-zero ordering risk in FILTER AND clause (Postgres doesn't guarantee short-circuit) and `total_stations` denominator inflated by prev_price=0 rows — fixed with NULLIF(prev_price, 0) + WHERE p.prev_price > 0 on the outer query, so the ratio is rising/valid not rising/(valid+anomalies). (5) parseInt('2026-05-09T...') returned 2026 → epoch 1970 → all alerts switch to 'as-expected' copy if Story 6.3 ever changes the predictive timestamp format — fixed with `/^\\d+$/.test(raw)` strict regex before parse. (6) `triggeredByStationId` payload field wasn't logged anywhere despite being on the wire — added to threshold-met log line for traceability. (7) `removeOnFail: {count: 50}` was ~10-20 min of failure history during peak — bumped to 500 + age 48h so ops can investigate why no alert fired. Defers: atomic SET-NX for dedup (BullMQ jobId already serializes execution per voivodeship+fuel; defence-in-depth not load-bearing); unbounded userIds in IN-clause (acceptable at MVP scale, refactor when user count grows); 2% MIN_RISE_PCT may be noisy — observe in production before tuning; push i18n — server has no locale field on NotificationPreference; CommunityRiseAlertService premature export per spec T4b for Story 6.3; threshold CTE 24h-window flexibility — spec defines this exact behavior, not a bug. 1279/1279 api tests pass; tsc + lint clean."
        patches_applied: "2026-05-09 — time-bucketed jobId (30-min window), short 1h dedup when no eligible users, NULLIF + WHERE prev_price > 0 in CTE, strict numeric regex for predictive parse, triggeredByStationId in trace logs, removeOnFail bumped to 500/48h, getEligibleUsers comment corrected. +1 test updated to verify short-TTL empty-user branch."
      - id: 6.3
        title: "Predictive Price Rise Alerts"
        file: 6-3-predictive-rise-alerts.md
        status: review
        ready_date: 2026-04-07
        dev_started: 2026-05-09
        dev_completed: 2026-05-09
        review_date: 2026-05-09
        review_findings: "Pure backend: PredictiveRiseAlertService consumes Story 6.0's price-rise-signals queue, sends a single push per opted-in user (rise_predictive_enabled=true) when ≥3% upward signals fire. Per-fuel 72h dedup via atomic SET NX EX. Phase 1 PriceRiseAlertWorker scheduled crons removed; existing repeat-jobs in Redis auto-cleaned at module init via removeRepeatableByKey. Brent crude jobs delayed 60s in Story 6.0's publisher (redundant safety net layered on top of SET NX). Story 6.2's predictive-key contract corrected from per-voivodeship to per-fuel (predictive alerts are NATIONAL). Spec divergences vs codebase: NestJS Bull (BullModule.forFeature, @Processor) replaced with raw BullMQ Worker matching the codebase pattern; T4 BullModule queue registration N/A under raw pattern (queue is owned by MarketSignalModule's PriceRiseSignalPublisher; the worker just subscribes by name). Three parallel reviewers (blind/edge/auditor) flagged 30+ items; high-impact fixes applied: (1) ATOMIC SET NX DEDUP — replaced original GET-then-SET pattern with `redis.set(key, ts, 'EX', TTL, 'NX')` returning the OK/null reply as the claim decision. Closes the TOCTOU race that the 60s Brent delay was papering over: two concurrent jobs (e.g. ORLEN + delayed Brent firing at the same moment, or two ORLEN signals for same fuel) can't both pass and both push. Same defensive pattern shipped in Story 6.1's price-drop-alert. (2) PHASE 1 CRON AUTO-CLEANUP — added queue.getRepeatableJobs() + removeRepeatableByKey() filtered to the morning/afternoon Phase 1 jobIds in alert.worker.ts onModuleInit. Idempotent — running on a fresh queue is a no-op; running on a queue with leftover jobs from prior deploys removes them. Avoids the manual ops sweep the original implementation required and prevents Phase 1 alerts from continuing to fire alongside Phase 2 in production. (3) STORY 6.2 CONTRACT TEST — added an explicit `expect(mockRedisGet).toHaveBeenCalledWith('alert:rise:predictive:PB_95')` assertion in community-rise-alert.service.spec.ts to lock the corrected per-fuel key. Without this, a regression to the voivodeship-scoped key would still pass behavioral tests because the existing mocks didn't care about the key. (4) Made getEligibleUsers private (was public with no external callers); typed signalSource constant in publisher (no magic string in delay check); removed misleading `void voivodeship` (param IS used in the warn log + comments). Defers (with reasoning): (a) Worker swallows processor errors → BullMQ retries inert: matches existing 6.1/6.2 pattern, accepted (logs [OPS-ALERT] inside catch so failures aren't invisible). (b) Cursor + chunkMessages multi-user mismap test: same pattern as 6.1/6.2 single-user tests; defer with shared push-helper refactor. (c) Stale Story 6.2 voivodeship-scoped Redis keys lingering 48h post-deploy: ops cleanup task — defer. (d) Brent magic 60s delay: SET NX (#1) makes it irrelevant for correctness; documented as comfort headroom only. (e) Empty/duplicate fuelTypes guard: defensive only, low impact. 1362/1362 api tests pass; tsc + lint clean."
        patches_applied: "2026-05-09 — atomic SET NX EX claim + Phase 1 cron auto-cleanup at onModuleInit + Story 6.2 contract test + getEligibleUsers private + typed signalSource constant + removed dead `void voivodeship` all applied. +3 net new tests (atomic claim, Phase 1 jobIds removed, Story 6.2 key contract). Cross-story: modified Story 6.0's price-rise-signal.publisher.ts for the Brent 60s delay per spec T5a; modified Story 6.2's community-rise-alert.service.ts for the predictive-key contract correction per Story 6.3 spec correction at line 196."
      - id: 6.5
        title: "Monthly Savings Summary Notification"
        file: 6-5-monthly-savings-summary-notification.md
        status: review
        ready_date: 2026-04-07
        dev_started: 2026-05-09
        dev_completed: 2026-05-09
        review_date: 2026-05-09
        review_findings: "Pure-backend story: cron-driven monthly aggregation over Story 5.x fillup data + Phase 1 monthly_summary toggle. Single bulk SQL aggregates per-user savings (SUM((area_avg_at_fillup - price_per_litre_pln) * litres) > 0), filtered to non-soft-deleted users; chunked Expo push send; Redis re-prompt key for Story 6.6 on no-token branch. Cron at 09:00 Warsaw on 1st of each month via raw BullMQ (matches the codebase's existing 6 cron-worker pattern). Three parallel reviewers (blind/edge/auditor) flagged 4 CRITICALs + 30+ items; high-impact fixes applied: (1) AC6 BUG — original code treated MISSING NotificationPreference row as opted-out, but the schema column defaults to true and the spec AC6 says only EXPLICIT false skips. NotificationPreference rows are created lazily by getPreferences/updatePreferences in notifications.service, so a user who never opened notification settings would never receive a summary. Fixed: `if (pref && pref.monthly_summary === false)` instead of `!pref?.monthly_summary`. Missing row now routes to no-token branch (which sets the Story 6.6 re-prompt key). (2) IDEMPOTENCY — added per-month Redis SET-NX run-lock (`monthly:summary:run:{YYYY-MM}` 25h TTL) at top of runForMonth so cron-restart, BullMQ retry, or accidental re-trigger doesn't re-push every eligible user. Fail-OPEN on Redis errors so an outage doesn't suppress an entire month. (3) `Math.round(0.4) = 0` would deliver 'You saved 0 PLN' copy — added skip when `Math.round(savings) < 1`. (4) NULL guards on `price_per_litre_pln` and `litres` in aggregateSavings SQL — without them, SUM with any NULL operand silently drops the row, mis-stating the user's savings. Defers (with reasoning): (a) Localization — service hardcodes en-GB and English copy. The SPEC pseudocode itself uses en-GB hardcoded; this is a spec gap, not an implementation deviation. Polish/Ukrainian users get English copy until a separate i18n task adds User.locale or NotificationPreference.locale field. (b) Multi-pod cron firing — saved to memory as `project_cron_worker_multipod`. ALL 6 existing cron workers in the codebase (PriceRiseAlertWorker, PremiumExpiryWarningWorker, StalenessDetectionWorker×2, OrlenIngestionWorker×2, ConsumptionBenchmarkWorker) follow the exact same OnModuleInit-on-every-pod pattern. railway.toml has no numReplicas (single replica). Systemic concern, not 6.5-specific; a centralised WORKER_ENABLED gate is the right fix when scaling beyond 1 replica. (c) Per-user idempotency markers — the per-month lock catches the main risk; per-user adds Redis pressure for marginal benefit on a job that already runs once per month. (d) `previousMonth()` uses server-local time — Railway is UTC and cron fires at 09:00 Warsaw (07/08:00 UTC), well past midnight, so off-by-one is impossible at firing time. (e) UTC vs Warsaw month-window for filled_at filtering — Railway is UTC, FillUp.filled_at is stored in UTC; matches insertion semantics. (f) userIds unbounded IN-clause — MVP scale fine. (g) Sequential updateMany inside chunk error loop — only triggers on stale-token batches, rare. (h) Cursor + chunkMessages order assumption — same pattern as 6.1/6.2; defer until shared push-helper refactor. 1302/1302 api tests pass; tsc + lint clean."
        patches_applied: "2026-05-09 — AC6 missing-row→opted-in fix + per-month run-lock (Redis SET NX 25h) + sub-1-PLN skip + SQL NULL guards on price_per_litre_pln/litres all applied. +5 new tests (3 run-lock variants, 2 sub-1-PLN boundary). Multi-pod cron concern saved to project_cron_worker_multipod memory for codebase-wide tracking."
      - id: 6.6
        title: "Smart Notification Re-prompting"
        file: 6-6-smart-notification-reprompting.md
        status: review
        ready_date: 2026-04-07
        dev_started: 2026-05-09
        dev_completed: 2026-05-09
        review_date: 2026-05-09
        review_findings: "Backend: GET /v1/me/notifications/summary-reprompt computes prior-month savings only when user has no token AND Story 6.5's monthly:summary:calculated:{userId} Redis key exists; fail-CLOSES on Redis errors so we don't surface a stale 'you saved X' claim with no backing. Mobile: shared NotificationRepromptSheet (photo+monthly variants) + repromptStorage helpers (two-strike rule via AsyncStorage flags); photo trigger fires on confirm.tsx after a 1s delay, monthly trigger lives at the (app) layout as MonthlySummaryRepromptTrigger sibling. Spec divergences vs codebase / fixes: (a) Spec says navigate to /(app)/alerts after Enable; implementer routes to /(app)/notifications since Story 6.10 moved prefs there and a fresh opt-in user benefits more from configuring preferences than the inbox. (b) Spec suggested adding hasPushToken to user profile API; implementer used useNotificationPermission (OS ground truth) instead — more authoritative than server-cached token. (c) Spec records AsyncStorage flag on dismiss; implementer records on SHOW because confirm.tsx auto-navigates after 4-6s and a user who doesn't engage would never fire onDismiss, leading to a re-prompt on every photo submission. Three parallel reviewers (blind/edge/auditor) flagged a near-BLOCKER + 30+ items; high-impact fixes applied: (1) DEAD-ENABLE BUG on iOS — original triggered on any non-granted state including 'denied'. iOS requestPermissionsAsync after prior denial returns 'denied' silently without showing the OS dialog, so the Enable button visibly does nothing. Narrowed both triggers to permissionStatus === 'undetermined' only; 'denied' users are handled by the existing re-prompt UI in alerts.tsx with a Settings deep-link. (2) AUTO-DISMISS RACE — confirm.tsx auto-replaces to map at 4s/6s; sheet shown at 1s would give user only 3-5s to read and respond. Now pauses the auto-dismiss timer while sheet is visible, re-arms on dismiss. (3) SILENT HALF-ENABLED STATE — apiUpdateNotificationPreferences PATCH used .catch(() => undefined) and navigated regardless. Now wraps in try/catch with explicit Alert showing repromptSaveFailedHint i18n string so the user knows to retry from /notifications. (4) Re-check live permission status inside both async blocks — catches user granting via Settings deep-link mid-evaluation. (5) Token rotation re-fire — removed accessToken from monthly trigger useEffect deps + eslint-disable note (avoids wasteful API calls on every token rotation). (6) Backend: validates Redis value strictly with === '1' (defends against future stories overloading the same key with sentinels like '0'). (7) Backend rounding logic simplified — same boundary behavior, clearer intent. (8) Polish copy switched from masculine-only 'Zaoszczędziłeś' to gender-neutral 'Oszczędności w zeszłym miesiącu'. Defers (with reasoning): sheet stacking (photo + monthly simultaneously) — extremely rare (confirm.tsx only reachable AFTER (app) layout has mounted, by which time monthly trigger has already evaluated); mobile component test coverage — no React Native test harness in repo, accept gap; AppState.active check before recording — micro-optimization, accept the rare backgrounded-strike-burn; backend throttle on summary-reprompt endpoint — MVP scale fine; accessibility focus trap — separate accessibility pass; engagement analytics — could be Story 6.8. 1309/1309 api tests pass; tsc + lint clean."
        patches_applied: "2026-05-09 — narrow triggers to 'undetermined' only + auto-dismiss pause + Alert on PATCH failure + live-permission re-check + remove accessToken dep + Redis === '1' validation + rounding simplification + Polish gender-neutral copy all applied. +1 i18n key (repromptSaveFailedHint) in en/pl/uk."

      - id: hardening-2
        title: "BullMQ Connection Sharing"
        file: hardening-2-bullmq-connection-sharing.md
        status: review
        ready_date: 2026-05-12
        dev_started: 2026-05-12
        dev_completed: 2026-05-13
        review_date: 2026-05-13
        review_findings: "Triggered by 2026-05-12 staging outage — Phase 2 worker count (15 workers × 2 conns + 1 main = 31) exceeded Redis Cloud free-tier 30-conn cap. Refactor: drop per-worker queue-side ioredis, reuse shared REDIS_CLIENT for non-blocking Queue commands. Per-worker dedicated blocking ioredis stays (BullMQ requirement). Net: 31 → ~16 connections, fits under free-tier with headroom. Three parallel reviewers (blind/edge/auditor) flagged 1 BLOCKER + 3 HIGH + 5 MEDIUM + 4 LOW; 9 patches applied. (1) BLOCKER (F1) — shared REDIS_CLIENT used `maxRetriesPerRequest: 3`; BullMQ requires `null` (recent versions throw at Queue construction, older versions silently lose commands after 3 retries). Set to null + added `enableReadyCheck: false`. (2) HIGH (F2) — Queue side uses REDIS_URL, Worker side uses BULL_REDIS_URL; if they diverge, queue producers and consumers talk to different brokers → silent 100% job loss. Added boot-time assertion in RedisModule factory that the two env vars match, with clear error message + path-forward documentation. (3) HIGH (F3) — pervasive worker-side comments asserted 'shared client lives in RedisModule lifecycle' but RedisModule had no OnModuleDestroy and main.ts never called enableShutdownHooks(); leak on SIGTERM. Added both — `RedisModule implements OnModuleDestroy` with `client.quit()` + fail-soft logging; `app.enableShutdownHooks()` in main.ts. NestJS reverse-dependency destroy order means workers tear down first, then RedisModule, so the new lifecycle is correct. (4) MEDIUM (F4) — `predictive-rise-alert.worker.ts` skipped during refactor (consumer-only, already 1 connection, but field name `redisForWorker` inconsistent with the rest). Renamed to `redisForBlocking`. (5) MEDIUM (F6) — cross-worker spec's AC4 assertion was a tautology (`mockSharedClient.not.toHaveProperty('quit')` on a stub that never had quit). Replaced with a proper jest.fn() spy + `not.toHaveBeenCalled()`. (6) MEDIUM (F7) — added grep-style safety net test that scans every `*.worker.ts` + `*.publisher.ts` under apps/api/src for the forbidden `redisForQueue` pattern; catches a future worker #16 re-introducing the regression. (7) MEDIUM (F8) — `consumption-benchmark.worker.ts` destroy block used `Promise.allSettled([single-element])` shape inconsistent with other workers; simplified to match. (8) MEDIUM (F9) — `price-rise-signal.publisher.ts` had `void config.getOrThrow('BULL_REDIS_URL')` as a footgun (would block deploy if env missing despite not being used). Removed; relying on RedisModule's assertion (F2) for env validation. ConfigService dep also dropped since it became unused. (9) LOW (F10) — `photo-pipeline.worker.spec.ts` + `alert.worker.spec.ts` didn't assert quit-count → potential regression hole. Added `mockRedisQuit.toHaveBeenCalledTimes(1)` assertion to both. Also fully rewrote `redis.module.spec.ts` to exercise the REAL RedisModule (was inlining a fake factory) + added explicit tests for F1/F2/F3 (sets maxRetriesPerRequest:null, throws on env mismatch, fires quit on destroy, swallows quit failures). Defers (with reasoning): (a) `PhotoCleanupWorker` still leaks 1 ioredis on shutdown — pre-existing pattern; was 2 connections pre-refactor, now 1; saved to project_photo_cleanup_worker_leak memory for future cleanup. (b) Shared REDIS_CLIENT pipelining contention under burst load — speculative at MVP scale; saved to project_redis_pipelining_observability memory as a monitoring task. Rejected (1): cross-worker spec stub modeling fidelity — current shape passes correctly, modeling more of ioredis surface adds noise without benefit. 1428/1428 api tests pass (was 1419, +9 new); tsc + lint clean across all 8 workspaces."
        patches_applied: "2026-05-13 — 9 of 9 applied. F1 (maxRetriesPerRequest: null), F2 (boot-time REDIS_URL === BULL_REDIS_URL assertion), F3 (RedisModule OnModuleDestroy + enableShutdownHooks), F4 (predictive-rise rename), F6 (proper spy assertion), F7 (grep safety net for future workers), F8 (consumption-benchmark destroy block consistency), F9 (publisher dead getOrThrow removed), F10 (quit-count assertions added). +9 new tests (7 in rewritten redis.module.spec.ts, 1 in cross-worker spec for F7 grep, 1 in alert+photo-pipeline specs for F10). Two deferred items saved to memory: project_photo_cleanup_worker_leak + project_redis_pipelining_observability."
        rev2_findings: "2026-05-13 — pre-deploy env-var check uncovered F2's load-bearing assumption was wrong for prod: REDIS_URL points at Upstash, BULL_REDIS_URL points at Railway Redis. F2's assertion would have crash-looped the prod API on boot. Refactored to a split-client architecture instead: RedisModule now provides two distinct tokens — REDIS_CLIENT (built from REDIS_URL, used for cache/dedup/run-locks) and REDIS_QUEUE_CLIENT (built from BULL_REDIS_URL, used for every BullMQ Queue construction in workers). Both clients use `maxRetriesPerRequest: null + enableReadyCheck: false` for BullMQ eligibility. F2 boot-time assertion REMOVED — diverging URLs is now a supported architecture, not a bug. RedisModule.onModuleDestroy closes BOTH clients via Promise.allSettled. Net connection count: prod +1 (Upstash 1 + Railway-Redis 16 = 17 across two brokers), staging +1 (single broker 17, still under 30 cap). 15 workers + 1 publisher renamed `redisShared → redisQueueClient` for clarity. 1430/1430 api tests pass (was 1428, +2 new for divergence + dual-destroy)."
        rev2_applied: "2026-05-13 — split-client refactor complete. RedisModule exports REDIS_CLIENT + REDIS_QUEUE_CLIENT; 15 workers + 1 publisher updated; redis.module.spec.ts rewritten to test both same-broker and divergent-broker setups + dual destroy; cross-worker integration spec updated for new token name. F2 assertion removed."


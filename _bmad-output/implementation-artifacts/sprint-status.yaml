      - id: 5.8
        title: "Savings Percentile"
        file: 5-8-savings-percentile.md
        status: review
        ready_date: 2026-05-10
        dev_started: 2026-05-10
        dev_completed: 2026-05-10
        review_date: 2026-05-10
        review_findings: "Reformulated successor to cancelled 6.7. Backend SavingsRankingService computes voivodeship-scoped percentile (≥10-saver privacy floor); mobile renders 'top X% of savers' on ShareableCard + savings-summary screen + 6.5 notification — voivodeship name never appears in any rendered surface. Drops `rankingVoivodeship` from MonthlySummaryDto. Three parallel reviewers (blind/edge/auditor) flagged 1 BLOCKER + 2 HIGH + 7 MEDIUM + 6 LOW; all 16 patches applied. (1) BLOCKER — single-user `cohort_users` CTE filtered by direct WHERE voivodeship rather than computing each user's most-recent voivodeship first. Same multi-voivodeship commuter would get a different percentile from /savings-summary vs the next morning's push notification. Fixed by mirroring the bulk path's MRV-then-filter pattern. (2) HIGH — RANK() ties without tiebreaker could produce topPercent > 100 for the bottom-tied driver. Fixed with `ORDER BY total_savings_pln DESC, user_id` deterministic tiebreaker + `Math.min(100, …)` belt-and-suspenders cap. (3) HIGH — missing index on FillUp(voivodeship, filled_at). Bulk monthly cron would become a sequential scan as the table grows. Added migration 20260514000000_add_fillup_voivodeship_index. (4) MEDIUM — 'you're in the top 100% of savers!' notification copy reads as sarcasm; gated percentile clause on topPercent ≤ 50 (PERCENTILE_NOTIFICATION_CEILING), bottom-half users fall through to 'Great month!' (5) MEDIUM — ranking SQL used raw float `(area_avg - price) * litres`; summary path uses grosz integer math via ROUND. A user with 0.005 PLN savings could be in/out of cohort by float drift. Switched both ranking queries to ROUND-then-SUM matching the summary path. (6) MEDIUM — soft-delete filter only in savings CTE; added `JOIN User u … WHERE u.deleted_at IS NULL` to user_voivodeship + cohort_users (inner mrv subquery) + most_recent_voivodeship for defence-in-depth. (7) MEDIUM — skip-when-savings-zero short-circuit in fillup.service.ts gated on rounded totalSavingsPln; fixed to gate on raw `savingsRowFirst.total_savings` so the two definitions of 'positive' agree. (8) MEDIUM — bigint typing risk on RANK()/COUNT() — added defensive `Number()` coercion at percentile call site. (9) MEDIUM — window-bounds test asserted expect.any(Date); pinned to exact UTC half-open bounds. (10) MEDIUM — privacy floor counts savers (HAVING > 0) not all drivers in region; documented as known boundary trade-off in COHORT_THRESHOLD comment, can raise threshold if production data shows it matters. (11) LOW — bulk lookup ran even when no opted-in users; added `hasOptedInUsers` short-circuit. (12) LOW — unused Logger now used for null-branch debug logs. (13) LOW — PL/UK i18n drift between card pill ('kierowców'/'водіїв') and screen line ('pod względem oszczędności'/'за заощадженнями'); aligned screen text to match card phrasing per locale. (14) LOW — privacy canary test only swept 'your area' string; added POLISH_VOIVODESHIP_SLUGS sweep against both buildNotificationPayload and the live bulk-lookup path. (15) LOW — verbatim `expect(body).toBe(...)` brittle; replaced with negative + targeted contains assertions. (16) LOW — row-level area_avg_at_fillup IS NOT NULL filter behaviour now documented in code. Defers (with reasoning): (a) FillUp.voivodeship still returned by GET /v1/me/fillups history endpoint — pre-existing privacy posture leak surface, out of 5.8 scope, saved to project_fillup_voivodeship_leak_surface memory. (b) All ranking tests are mock-only with no SQL semantic coverage — project-wide convention; same pattern as 1396 other tests in the suite. (c) No bulk-query month-rollover tests — single-user spec already validates UTC bounds. (d) `rankingVoivodeship` removal is a wire-shape break — acknowledged in spec, no production traffic on Phase 2 endpoints yet. (e) T8e mobile ShareableCard structural test — repo has no React Native component test harness, consistent with prior story patches_applied notes. 1408/1408 api tests pass (was 1396, +12 new); 50/50 mobile pass; tsc + lint clean across all 8 workspaces."
        patches_applied: "2026-05-10 — 16 of 16 applied. Single-user/bulk cohort semantics now identical (MRV-then-filter); RANK() tiebreaker + topPercent cap; new FillUp(voivodeship, filled_at) index migration; notification copy gated at percentile ≤ 50; grosz integer math in ranking SQL; soft-delete filter in every CTE; skip-when-zero gate uses raw sum; bigint coercion; window-bounds test pinned; bulk-lookup short-circuit on no opted-in users; PL/UK i18n alignment; voivodeship-slug privacy canary. New deferred memory: project_fillup_voivodeship_leak_surface (FillUp.voivodeship still on history endpoint, privacy posture risk for any future surface)."
      - id: 5.9
        title: "Best-Saver Stat"
        file: 5-9-best-saver-stat.md
        status: review

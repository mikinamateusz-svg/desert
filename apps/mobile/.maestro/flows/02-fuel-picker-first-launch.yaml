appId: com.desert.app
name: First launch fuel picker appears and can be dismissed
---
- clearState
- launchApp
- extendedWaitUntil:
    visible: "Jaki paliwo tankujesz?"
    timeout: 15000
# Select ON (diesel)
- tapOn: "ON"
# Picker should dismiss
- assertNotVisible: "Jaki paliwo tankujesz?"
# Map fuel pills should be visible
- assertVisible: "95"

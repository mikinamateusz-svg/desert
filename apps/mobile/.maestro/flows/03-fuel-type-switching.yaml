appId: com.desert.app
name: Fuel type pills can be switched
---
- launchApp
- extendedWaitUntil:
    visible: "95"
    timeout: 15000
# Dismiss fuel picker if shown on first launch
- runFlow:
    when:
      visible: "Jaki paliwo tankujesz?"
    commands:
      - tapOn: "95"
# Tap ON pill to switch fuel type
- tapOn: "ON"
# ON pill should be visible (confirms no crash on switch)
- assertVisible: "ON"
# Switch to LPG
- tapOn: "LPG"
- assertVisible: "LPG"

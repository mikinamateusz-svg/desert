appId: com.desert.app
name: Tapping a station pin opens the detail sheet
---
- launchApp
- extendedWaitUntil:
    visible: "95"
    timeout: 15000
# Dismiss fuel picker if shown
- runFlow:
    when:
      visible: "Jaki paliwo tankujesz?"
    commands:
      - tapOn: "95"
# Wait for station pins to render (they show price labels like "5.89")
- extendedWaitUntil:
    visible: "zł/l"
    timeout: 15000
# Tap center of the map to hit a pin
- tapOn:
    point: "50%,50%"
# The station detail sheet should appear with navigate CTA
- extendedWaitUntil:
    visible: "Nawiguj"
    timeout: 5000
- assertVisible: "zł/l"

appId: com.desert.app
name: Cheapest in view button selects cheapest station
---
- launchApp
- extendedWaitUntil:
    visible: "95"
    timeout: 15000
# Dismiss fuel picker if shown
- runFlow:
    when:
      visible: "Jaki paliwo tankujesz?"
    commands:
      - tapOn: "95"
# Wait for cheapest button to appear (has trophy emoji)
- extendedWaitUntil:
    visible: "Najtańsza w widoku"
    timeout: 15000
- tapOn: "Najtańsza w widoku"
# Should open station detail sheet
- extendedWaitUntil:
    visible: "Nawiguj"
    timeout: 5000

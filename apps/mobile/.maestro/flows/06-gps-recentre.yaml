appId: com.desert.app
name: GPS recentre FAB returns map to user location
---
- launchApp
- extendedWaitUntil:
    visible: "95"
    timeout: 15000
# Dismiss fuel picker if shown
- runFlow:
    when:
      visible: "Jaki paliwo tankujesz?"
    commands:
      - tapOn: "95"
# Pan the map away
- swipe:
    direction: LEFT
    duration: 500
- swipe:
    direction: LEFT
    duration: 500
# Tap recentre FAB (accessibility label)
- tapOn:
    label: "Wróć do mojej lokalizacji"
# Verify app is still functional (map + pills visible)
- assertVisible: "95"
- assertVisible: "litro"

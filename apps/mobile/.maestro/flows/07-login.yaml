appId: com.desert.app
name: Login with email and password
---
- clearState
- launchApp
# SoftSignUpSheet should appear for guests — dismiss or navigate to login
# The onboarding sheet has a link/button to sign in
- extendedWaitUntil:
    visible: "Zaloguj się"
    timeout: 15000
- tapOn: "Zaloguj się"
# Login screen should show
- assertVisible: "Zaloguj się"
# Fill in email
- tapOn: "E-mail"
- inputText: "test@litro.app"
# Fill in password
- tapOn: "Hasło"
- inputText: "TestPassword123!"
# Submit
- tapOn:
    text: "Zaloguj się"
    index: 0
# Either: login succeeds and map appears, or error is shown
# For a smoke test, we just verify no crash and a response is shown
- extendedWaitUntil:
    true:
      or:
        - visible: "litro"
        - visible: "Nieprawidłowy adres e-mail lub hasło"
        - visible: "Coś poszło nie tak"
    timeout: 10000

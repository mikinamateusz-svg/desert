appId: com.desert.app
name: Login shows error for wrong credentials
---
- clearState
- launchApp
- extendedWaitUntil:
    visible: "Zaloguj się"
    timeout: 15000
- tapOn: "Zaloguj się"
# Submit with wrong credentials
- tapOn: "E-mail"
- inputText: "wrong@example.com"
- tapOn: "Hasło"
- inputText: "wrongpassword"
- tapOn:
    text: "Zaloguj się"
    index: 0
# Should show error message
- extendedWaitUntil:
    true:
      or:
        - visible: "Nieprawidłowy adres e-mail lub hasło"
        - visible: "Coś poszło nie tak"
    timeout: 10000

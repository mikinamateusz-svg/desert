services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: desert_dev
      POSTGRES_USER: desert
      POSTGRES_PASSWORD: desert
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desert -d desert_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass devpassword
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devpassword", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

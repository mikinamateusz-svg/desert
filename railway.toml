[build]
builder = "dockerfile"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
# Migrations run out-of-band (Railway shell or manual job); adding them back to
# startCommand hangs in both prod and staging for reasons still under investigation.
startCommand = "node dist/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[build]
builder = "dockerfile"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
# Migrations run in a separate step (see `pnpm db:migrate:deploy`) — starting the app
# directly lets us confirm runtime config independently of Prisma connection issues.
startCommand = "node dist/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[build]
builder = "dockerfile"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
preDeployCommand = "cd /app/packages/db && echo '[pre-deploy] starting prisma migrate deploy' && npx prisma migrate deploy 2>&1 && echo '[pre-deploy] success'"
startCommand = "node dist/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[build]
builder = "dockerfile"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
# Run Prisma migrations before the app starts. `&&` aborts the chain (and the deploy)
# if migrate fails, so a bad migration cannot ship a half-working container.
startCommand = "echo '[startup] running migrations' && cd /app/packages/db && npx prisma migrate deploy && echo '[startup] starting api' && cd /app/apps/api && node dist/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
